<script>
// в”Ђв”Ђв”Ђ Config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Binance гЃ« XAUUSDT г‚№гѓќгѓѓгѓ€гѓљг‚ўгЃЄгЃ— в†’ й‡‘г‚‚ Stooq гЃ«зµ±дёЂ
// allorigins.win гЃЊдёЌе®‰е®љгЃЄгЃџг‚Ѓи¤‡ж•°гѓ—гѓ­г‚­г‚·гЃ§гѓ•г‚©гѓјгѓ«гѓђгѓѓг‚Ї
const STOOQ_PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
];

const ASSETS = [
  { id: 'gold',        name: 'й‡‘ (Gold)',                          color: '#f59e0b', src: 'stooq',   symbol: 'xauusd',  base: 'USD' },
  { id: 'all_country', name: 'eMaxisSlim г‚Єгѓјгѓ«г‚«гѓігѓ€гѓЄгѓј (ACWI)',  color: '#6366f1', src: 'stooq',   symbol: 'acwi.us', base: 'USD' },
  { id: 'sp500',       name: 'eMaxisSlim S&P500 (S&P500жЊ‡ж•°)',     color: '#3b82f6', src: 'stooq',   symbol: '^spx',    base: 'USD' },
  { id: 'bitcoin',     name: 'гѓ“гѓѓгѓ€г‚іг‚¤гѓі (BTC)',                   color: '#f97316', src: 'binance', symbol: 'BTCUSDT', base: 'USD' },
  { id: 'topix',       name: 'TOPIX (1306.T ETF)',                  color: '#10b981', src: 'stooq',   symbol: '1306.jp', base: 'JPY' },
];

// Binance interval & limit
const BN_PERIODS = {
  '1d': ['1h',  24],
  '1w': ['4h',  42],
  '1m': ['1d',  31],
  '3m': ['1d',  92],
  '6m': ['1d',  183],
  '1y': ['1w',  53],
  '5y': ['1w',  261],
};

// в”Ђв”Ђв”Ђ State в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let currency = 'JPY';
let period = '1m';
let customStart = '';
let customEnd = '';
let usdjpy = 150;
const charts = {};

// в”Ђв”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const round = (v, d) => Math.round(v * 10**d) / 10**d;

function formatPrice(val, cur) {
  if (val == null || isNaN(val)) return 'вЂ•';
  if (cur === 'JPY') return val.toLocaleString('ja-JP', { maximumFractionDigits: 0 });
  return val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: val > 100 ? 2 : 4 });
}

function formatChange(val) {
  if (val == null || isNaN(val)) return { text: 'вЂ•', cls: 'neu' };
  const sign = val >= 0 ? '+' : '';
  return { text: `${sign}${val.toFixed(2)}%`, cls: val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu' };
}

function calcChanges(timestamps, prices) {
  if (!prices || prices.length < 2) return [null, null, null];
  const now = timestamps[timestamps.length - 1];
  const cur = prices[prices.length - 1];
  const DAY  = 86400_000;
  const WEEK = 7 * DAY;
  const MON  = 30 * DAY;

  function findRef(msAgo) {
    const target = now - msAgo;
    let best = null, bestDiff = Infinity;
    for (let i = 0; i < timestamps.length - 1; i++) {
      const d = Math.abs(timestamps[i] - target);
      if (d < bestDiff) { bestDiff = d; best = prices[i]; }
    }
    return best;
  }

  function pct(ref) {
    return (ref != null && ref !== 0) ? round((cur - ref) / ref * 100, 2) : null;
  }

  return [pct(findRef(DAY)), pct(findRef(WEEK)), pct(findRef(MON))];
}

// в”Ђв”Ђв”Ђ Data fetchers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function fetchUSDJPY() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    const v = d?.rates?.JPY;
    if (v) { usdjpy = v; document.getElementById('usdjpyDisplay').textContent = v.toFixed(2); }
  } catch {}
}

async function fetchStooqCsv(stooqUrl) {
  // и¤‡ж•°гѓ—гѓ­г‚­г‚·г‚’й †з•ЄгЃ«и©¦гЃ—гЂЃжњЂе€ќгЃ«ж€ђеЉџгЃ—гЃџг‚‚гЃ®г‚’иї”гЃ™
  let lastErr = new Error('Failed to fetch');
  for (const makeProxy of STOOQ_PROXIES) {
    try {
      const proxyUrl = makeProxy(stooqUrl);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(9000) });
      if (!r.ok) { lastErr = new Error(`HTTP ${r.status}`); continue; }
      const text = await r.text();
      if (text && text.includes(',') && !text.startsWith('No data')) return text;
      lastErr = new Error('гѓ‡гѓјг‚їгЃЄгЃ—');
    } catch (e) {
      lastErr = e.name === 'TimeoutError' ? new Error('г‚їг‚¤гѓ г‚ўг‚¦гѓ€') : e;
    }
  }
  throw lastErr;
}

async function fetchStooq(symbol, per, start, end) {
  // Stooq гЃЇж—Ґж¬Ўгѓ‡гѓјг‚їг‚’ CSV гЃ§жЏђдѕ›гЂ‚CORS гѓ—гѓ­г‚­г‚·зµЊз”±гЃ§гѓ–гѓ©г‚¦г‚¶гЃ‹г‚‰еЏ–еѕ—гЃ™г‚‹гЂ‚
  const DAYS = { '1d': 5, '1w': 14, '1m': 32, '3m': 93, '6m': 184, '1y': 367, '5y': 1827 };
  let d1, d2;
  if (per === 'custom' && start && end) {
    d1 = start.replace(/-/g, '');
    d2 = end.replace(/-/g, '');
  } else {
    const days = DAYS[per] || 32;
    const endDate = new Date();
    const startDate = new Date(endDate.getTime() - days * 86400000);
    d1 = startDate.toISOString().slice(0, 10).replace(/-/g, '');
    d2 = endDate.toISOString().slice(0, 10).replace(/-/g, '');
  }
  const stooqUrl = `https://stooq.com/q/d/l/?s=${symbol}&d1=${d1}&d2=${d2}&i=d`;
  const csv = await fetchStooqCsv(stooqUrl);
  if (!csv) throw new Error('гѓ‡гѓјг‚їгЃЄгЃ—');

  const lines = csv.trim().split('\n');
  const ts = [], prices = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',');
    if (parts.length < 5) continue;
    const date = parts[0].trim();
    const close = parts[4].trim();
    if (!date || !close || close === 'null') continue;
    const t = new Date(date).getTime();
    const p = parseFloat(close);
    if (!isNaN(t) && !isNaN(p)) { ts.push(t); prices.push(p); }
  }
  if (ts.length === 0) throw new Error('гѓ‡гѓјг‚їгЃЄгЃ—');
  return [ts, prices];
}

async function fetchBinance(symbol, per, start, end) {
  let params;
  if (per === 'custom' && start && end) {
    const st = new Date(start).getTime();
    const et = new Date(end).getTime() + 86400_000;
    params = `symbol=${symbol}&interval=1d&startTime=${st}&endTime=${et}&limit=1000`;
  } else {
    const [interval, limit] = BN_PERIODS[per] || ['1d', 31];
    params = `symbol=${symbol}&interval=${interval}&limit=${limit}`;
  }
  const r = await fetch(`https://api.binance.com/api/v3/klines?${params}`);
  if (!r.ok) throw new Error(`Binance ${r.status}`);
  const data = await r.json();
  const ts     = data.map(k => k[0]);
  const prices = data.map(k => parseFloat(k[4]));
  return [ts, prices];
}

async function loadAsset(asset) {
  const loadEl = document.getElementById(`loading-${asset.id}`);
  const errEl  = document.getElementById(`err-${asset.id}`);
  loadEl.style.display = 'flex';
  errEl.textContent = '';

  try {
    let ts, prices;

    if (asset.src === 'stooq') {
      [ts, prices] = await fetchStooq(asset.symbol, period, customStart, customEnd);
    } else {
      [ts, prices] = await fetchBinance(asset.symbol, period, customStart, customEnd);
    }

    // Filter out null prices
    const paired = ts.map((t, i) => [t, prices[i]]).filter(([, p]) => p != null);
    ts     = paired.map(p => p[0]);
    prices = paired.map(p => p[1]);

    let displayPrices = prices;
    if (asset.base === 'USD' && currency === 'JPY') {
      displayPrices = prices.map(p => round(p * usdjpy, 2));
    } else if (asset.base === 'JPY' && currency === 'USD') {
      displayPrices = prices.map(p => round(p / usdjpy, 4));
    }

    // Update UI
    const cur = displayPrices.at(-1);
    const unit = currency === 'JPY' ? 'е††' : 'USD';
    document.getElementById(`price-${asset.id}`).innerHTML =
      `${formatPrice(cur, currency)}<span class="unit">${unit}</span>`;

    const [dc, wc, mc] = calcChanges(ts, displayPrices);
    for (const [sfx, val] of [['day', dc], ['week', wc], ['month', mc]]) {
      const el = document.getElementById(`${sfx}-${asset.id}`);
      const { text, cls } = formatChange(val);
      el.textContent = text;
      el.className = `change-val ${cls}`;
    }

    document.getElementById(`time-${asset.id}`).textContent =
      'ж›ґж–°: ' + new Date().toLocaleTimeString('ja-JP');

    // Update chart
    const chart = charts[asset.id];
    chart.data.datasets[0].data = ts.map((t, i) => ({ x: t, y: displayPrices[i] }));
    chart.update('active');

  } catch (e) {
    errEl.textContent = 'г‚Ёгѓ©гѓј: ' + e.message;
    console.error(asset.id, e);
  } finally {
    loadEl.style.display = 'none';
  }
}

// в”Ђв”Ђв”Ђ Chart init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function makeChart(asset) {
  const ctx = document.getElementById(`chart-${asset.id}`).getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 220);
  g.addColorStop(0, asset.color + '44');
  g.addColorStop(1, asset.color + '00');

  charts[asset.id] = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: [], borderColor: asset.color, backgroundColor: g,
        borderWidth: 2, pointRadius: 0, fill: true, tension: 0.2,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2a2d3e', borderWidth: 1,
          titleColor: '#8892a4', bodyColor: '#e2e8f0',
          callbacks: {
            title: items => {
              const d = new Date(items[0].parsed.x);
              return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            },
            label: ctx => {
              const v = ctx.parsed.y;
              return currency === 'JPY'
                ? `ВҐ${v.toLocaleString('ja-JP', { maximumFractionDigits: 0 })}`
                : `$${v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: v > 100 ? 2 : 4 })}`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            displayFormats: {
              minute: 'H:mm',
              hour:   'M/d Hж™‚',
              day:    'M/d',
              week:   'M/d',
              month:  'yyyy/M',
              year:   'yyyyе№ґ',
            },
            tooltipFormat: 'yyyy/MM/dd HH:mm',
          },
          grid: { color: '#1e2133' },
          ticks: { color: '#8892a4', maxTicksLimit: 8, font: { size: 10 }, maxRotation: 0 },
        },
        y: {
          position: 'right',
          grid: { color: '#1e2133' },
          ticks: {
            color: '#8892a4',
            font: { size: 10 },
            maxTicksLimit: 10,       // в†ђ more ticks
            precision: 0,
            callback: v => {
              if (currency === 'JPY') {
                if (v >= 1_000_000) return `ВҐ${(v/1_000_000).toFixed(2)}M`;
                if (v >= 10_000)   return `ВҐ${Math.round(v/1000)}k`;
                return `ВҐ${v.toLocaleString('ja-JP')}`;
              }
              if (v >= 10_000) return `$${Math.round(v/1000)}k`;
              return `$${v.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`;
            }
          }
        }
      }
    }
  });
}

// в”Ђв”Ђв”Ђ DOM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createCard(asset) {
  const d = document.createElement('div');
  d.className = 'card';
  d.id = `card-${asset.id}`;
  d.innerHTML = `
    <div class="loading-overlay" id="loading-${asset.id}"><div class="spinner"></div></div>
    <div class="card-header">
      <div>
        <div class="card-title">${asset.name}</div>
        <div class="card-price" id="price-${asset.id}">вЂ•</div>
        <div class="error-msg" id="err-${asset.id}"></div>
      </div>
      <div class="update-time" id="time-${asset.id}"></div>
    </div>
    <div class="changes">
      <div class="change-item"><div class="change-label">е‰Ќж—ҐжЇ”</div>  <div class="change-val neu" id="day-${asset.id}">вЂ•</div></div>
      <div class="change-item"><div class="change-label">е‰ЌйЂ±жЇ”</div>  <div class="change-val neu" id="week-${asset.id}">вЂ•</div></div>
      <div class="change-item"><div class="change-label">е‰Ќжњ€жЇ”</div>  <div class="change-val neu" id="month-${asset.id}">вЂ•</div></div>
    </div>
    <div class="chart-wrap"><canvas id="chart-${asset.id}"></canvas></div>
  `;
  return d;
}

// в”Ђв”Ђв”Ђ Main в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const grid = document.getElementById('grid');
ASSETS.forEach(a => { grid.appendChild(createCard(a)); makeChart(a); });

async function fetchAll() {
  await fetchUSDJPY();
  ASSETS.forEach(a => loadAsset(a));
}

// Currency toggle
document.getElementById('currencyToggle').addEventListener('click', e => {
  if (!e.target.dataset.val) return;
  currency = e.target.dataset.val;
  document.querySelectorAll('#currencyToggle button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  fetchAll();
});

// Period buttons
document.getElementById('periodBar').addEventListener('click', e => {
  if (!e.target.dataset.val) return;
  period = e.target.dataset.val;
  document.querySelectorAll('#periodBar button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  const cr = document.getElementById('customRange');
  if (period === 'custom') {
    cr.classList.add('visible');
    const today = new Date();
    const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth() - 1);
    document.getElementById('startDate').value = monthAgo.toISOString().slice(0, 10);
    document.getElementById('endDate').value   = today.toISOString().slice(0, 10);
  } else {
    cr.classList.remove('visible');
    fetchAll();
  }
});

document.getElementById('applyCustom').addEventListener('click', () => {
  customStart = document.getElementById('startDate').value;
  customEnd   = document.getElementById('endDate').value;
  if (customStart && customEnd) fetchAll();
});

// Auto refresh every 5 min
setInterval(fetchAll, 5 * 60 * 1000);
fetchAll();
</script>
</body>
</html>
